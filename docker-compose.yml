services:
  api:
    build: .

    ports:
      - "3000:3000"

    volumes:
      - ".:/app"
      - "/app/node_modules"
    
    env_file:
      - .env

    depends_on:
      - mongo
      - redis
    
    command: ["npx", "nodemon", "-L", "server.js"]

  worker:
    build: .

    volumes:
      - ".:/app"
      - "/app/node_modules"

    env_file:
      - .env

    command: ["npx", "nodemon", "-L", "worker.js"]

    depends_on:
      - redis

  mongo:
    image: mongo:8

    ports:
      - "27017:27017"

    volumes:
      - mongo:/data/db

  redis:
    image: redis

    ports:
      - "6379:6379"
    
volumes:
  mongo: